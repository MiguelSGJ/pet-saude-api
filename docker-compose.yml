name: arboviroses

services:
  db:
    image: postgres:16-alpine
    container_name: arboviroses-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arboviroses_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-arboviroses_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  dbgate:
    image: dbgate/dbgate:latest
    container_name: arboviroses-dbgate
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${DBGATE_PORT:-8082}:3000"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arboviroses-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-arboviroses_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SECURITY_CORS_ALLOWED_ORIGINS: ${SECURITY_CORS_ALLOWED_ORIGINS:-http://localhost:8080}
      SECURITY_JWT_SECRET_KEY: ${SECURITY_JWT_SECRET_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      SECURITY_JWT_EXPIRATION_TIME: ${SECURITY_JWT_EXPIRATION_TIME:-3600000}
      SECURITY_JWT_REFRESH_TOKEN_EXPIRATION_TIME: ${SECURITY_JWT_REFRESH_TOKEN_EXPIRATION_TIME:-86400000}
      SEED_USER_NAME: ${SEED_USER_NAME:-admin}
      SEED_USER_CPF: ${SEED_USER_CPF:-12345678910}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:-admin}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  python-api:
    build:
      context: ../ArbovirosesPython
      dockerfile: Dockerfile
    container_name: arboviroses-python-api
    restart: unless-stopped

  frontend:
    build:
      context: ../ArbovirosesFront
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
        REACT_APP_PYTHON_API_URL: ${REACT_APP_PYTHON_API_URL:-/python-api}
    container_name: arboviroses-frontend
    depends_on:
      - backend
      - python-api
    ports:
      - "${PUBLIC_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  postgres_data:
