spring.application.name=pet-saude-api

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/saude}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Logging
logging.level.com.api.determinantes.sociais=DEBUG

spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:1GB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:1GB}

#cors config
security.cors.allowed-origins=${SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:5173}

#JWT config
security.jwt.secret-key=${SECURITY_JWT_SECRET_KEY:4f6c6153656e686f72416e64726545737461436861766545684d7569746f53656775726132303236}
security.jwt.expiration-time=${SECURITY_JWT_EXPIRATION_TIME:620000}
security.jwt.refreshToken.expiration-time=${SECURITY_JWT_REFRESH_TOKEN_EXPIRATION_TIME:1200000}

#Seed - credenciais do usuario padrao (nao commitar)
seed.user.name=${SEED_USER_NAME:admin}
seed.user.cpf=${SEED_USER_CPF:12345678910}
seed.user.password=${SEED_USER_PASSWORD:admin123}
